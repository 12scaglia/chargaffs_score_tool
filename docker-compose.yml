services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    # No `ports:` — internal-only on the compose network, reachable from
    # `frontend` (nginx) as http://backend:8000, never exposed to the host.

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
