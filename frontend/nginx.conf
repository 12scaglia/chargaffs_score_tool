server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Matches the backend's own upload cap (max_upload_size_bytes in
    # core/config.py) — nginx's 1m default would otherwise reject large
    # FASTA uploads with a 413 before they ever reach the backend.
    client_max_body_size 500M;

    # SPA fallback: any path that isn't a real static file falls back to
    # index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy to the backend service on the compose network. The
    # trailing slash on both the location and proxy_pass URI strips the
    # "/api" prefix before forwarding — e.g. /api/analyze becomes
    # http://backend:8000/analyze — matching what vite.config.ts's dev
    # proxy does today via rewrite: path => path.replace(/^\/api/, '').
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
